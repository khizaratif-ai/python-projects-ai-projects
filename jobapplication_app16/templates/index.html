<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Job Application Form</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <div class="form-card">

        <h1>Job Application Form</h1>

        <p class="subtitle">
            Please complete the form below.
        </p>

        <form action="{{ url_for('submit') }}" method="POST">

            <!-- First Name & Last Name -->

            <div class="row">

                <div class="form-group">
                    <label>First Name</label>

                    <input
                            type="text"
                            name="first_name"
                            placeholder="Enter your first name"
                            required>
                </div>

                <div class="form-group">
                    <label>Last Name</label>

                    <input
                            type="text"
                            name="last_name"
                            placeholder="Enter your last name"
                            required>
                </div>

            </div>

            <!-- Email & Phone -->

            <div class="row">

                <div class="form-group">
                    <label>Email Address</label>

                    <input
                            type="email"
                            name="email"
                            placeholder="example@gmail.com"
                            required>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>

                    <input
                            type="tel"
                            name="phone"
                            placeholder="+92 300 1234567"
                            required>
                </div>

            </div>

            <!-- Date & Qualification -->

            <div class="row">

                <div class="form-group">

                    <label>Available Start Date</label>

                    <input
                            type="date"
                            name="start_date"
                            required>

                </div>

                <div class="form-group">

                    <label>Highest Qualification</label>

                    <select
                            name="qualification"
                            required>

                        <option value="">Select Qualification</option>

                        <option>Matric</option>
                        <option>Intermediate</option>
                        <option>Bachelor's Degree</option>
                        <option>Master's Degree</option>
                        <option>PhD</option>

                    </select>

                </div>

            </div>

            <!-- Occupation -->

            <div class="form-group">

                <label>Current Occupation</label>

                <div class="radio-group">

                    <label>
                        <input
                                type="radio"
                                name="occupation"
                                value="Employed"
                                required>
                        Employed
                    </label>

                    <label>
                        <input
                                type="radio"
                                name="occupation"
                                value="Unemployed">
                        Unemployed
                    </label>

                    <label>
                        <input
                                type="radio"
                                name="occupation"
                                value="Self-Employed">
                        Self-Employed
                    </label>

                    <label>
                        <input
                                type="radio"
                                name="occupation"
                                value="Student">
                        Student
                    </label>

                </div>

            </div>

            <!-- Experience -->

            <div class="row">

                <div class="form-group">

                    <label>Years of Experience</label>

                    <input
                            type="number"
                            name="experience"
                            min="0"
                            max="50"
                            placeholder="Enter years of experience">

                </div>

                <div class="form-group">

                    <label>Skills</label>

                    <input
                            type="text"
                            name="skills"
                            placeholder="Python, Java, HTML, CSS...">

                </div>

            </div>

            <!-- Cover Letter -->

            <div class="form-group">

                <label>Cover Letter</label>

                <textarea
                        name="cover_letter"
                        rows="6"
                        placeholder="Tell us why we should hire you..."
                        required></textarea>

            </div>

            <!-- Terms -->

            <div class="checkbox-group">

                <label>

                    <input
                            type="checkbox"
                            required>

                    I confirm that all the information provided is accurate.

                </label>

            </div>

            <button
                    type="submit"
                    class="submit-btn">

                Submit Application

            </button>

        </form>

    </div>

</div>

</body>

</html>
