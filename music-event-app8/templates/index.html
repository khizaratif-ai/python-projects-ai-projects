<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Event Finder</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">

        <h1>🎵 Music Event Finder</h1>

        <p class="subtitle">
            Search for your favorite music events
        </p>

        <form action="/search" method="POST">

            <input
                type="text"
                name="keyword"
                placeholder="Enter artist or event name..."
                required
            >

            <br><br>

            <button type="submit">
                Search
            </button>

        </form>

    </div>

</body>
</html>
